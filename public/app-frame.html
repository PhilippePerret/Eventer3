<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Eventer2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/data/themes/default.css">
</head>
<body>

  <input id="filter-input" class="hidden" type="text" placeholder="Filtrer par titre…" autocomplete="off" />

  <main id="main-panel"></main>

  <div id="filter-bar" class="hidden"></div>

  <div id="status-bar"></div>
  <footer id="shortcuts-footer" aria-label="Raccourcis clavier"></footer>

  <div id="shortcuts-panel" class="hidden"></div>

  <div id="contextual-help-hint">AIDE ⇧⌘&thinsp;?</div>

  <div id="notification" class="notification hidden"></div>

  <div id="brin-panel" class="hidden"></div>

  <div id="perso-panel" class="hidden"></div>

  <div id="style-panel" class="hidden"></div>

  <div id="tools-panel" class="hidden"></div>

  <div id="constants-panel" class="floating-panel hidden"></div>

  <div id="filter-selector-panel" class="hidden"></div>

  <div id="panel-overlay" class="hidden">
    <div id="panel"></div>
  </div>

  <script src="/config.js"></script>
  <script type="module" src="/constants.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
